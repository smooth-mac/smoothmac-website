name: CI / Deploy

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  check:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (astro check)
        run: npm run check

      - name: Build
        run: npm run build

      - name: Check output size
        run: du -sh dist/

  deploy-preview:
    name: Deploy Preview (dev branch)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      deployments: write
    environment:
      name: preview

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages (preview)
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 38a07df1967bdbd427dcbae445cf9b1c
          projectName: smoothmac-website
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: dev

  deploy-production:
    name: Deploy Production (main branch)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://smoothmac.app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 38a07df1967bdbd427dcbae445cf9b1c
          projectName: smoothmac-website
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
